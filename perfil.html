<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perfil Complementario · Planning & Analytics</title>
<style>
  :root {
    --bg: #000000;
    --bg-soft: #0a0a0a;
    --card: #141414;
    --card-hover: #1c1c1c;
    --border: #262626;
    --border-strong: #3a3a3a;
    --text: #ffffff;
    --muted: #9a9a9a;
    --accent: #86BC25;
    --accent-hover: #97cf2e;
    --accent-glow: rgba(134, 188, 37, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 24px 60px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    top: -200px;
    right: -200px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  .back-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.95rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }

  h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; line-height: 1.2; }
  .subtitle { color: var(--muted); margin-bottom: 32px; }

  .selector-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 24px;
  }
  label {
    display: block;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  select {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 1rem;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%239a9a9a' stroke-width='2' fill='none'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 40px;
  }
  select:focus { outline: none; border-color: var(--accent); }

  .answer-card {
    background: linear-gradient(135deg, var(--card) 0%, var(--bg-soft) 100%);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .answer-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    height: 3px;
    width: 100%;
    background: var(--accent);
  }
  .answer-card h2 {
    font-size: 1.2rem;
    margin-bottom: 18px;
    color: var(--accent);
  }
  .answer-card ul {
    list-style: none;
    padding: 0;
  }
  .answer-card li {
    padding: 10px 0 10px 24px;
    position: relative;
    line-height: 1.55;
    border-bottom: 1px solid var(--border);
    font-size: 1rem;
  }
  .answer-card li:last-child { border-bottom: none; }
  .answer-card li::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .global-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-top: 32px;
  }
  .global-card h2 {
    font-size: 0.95rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .global-row {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .global-row:last-child { border-bottom: none; }
  .global-row .name {
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 6px;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .global-row ul {
    list-style: none;
    padding-left: 4px;
  }
  .global-row li {
    color: var(--text);
    font-size: 0.92rem;
    line-height: 1.5;
    padding: 3px 0 3px 18px;
    position: relative;
  }
  .global-row li::before {
    content: "·";
    position: absolute;
    left: 6px;
    color: var(--muted);
  }

  .toggle-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    padding: 8px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .toggle-btn:hover { color: var(--text); border-color: var(--accent); }

  .empty {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 40px 20px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <a href="index.html" class="back-link">← Volver al panel</a>
  </div>

  <h1>Perfil con el que te complementas</h1>
  <p class="subtitle">Tipo de persona con la que se te da bien trabajar.</p>

  <div class="selector-wrap">
    <label for="person">Persona</label>
    <select id="person">
      <option value="">— Elige una persona —</option>
    </select>
  </div>

  <div id="content"></div>

  <div class="global-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <h2 style="margin:0;">Resumen del equipo</h2>
      <button class="toggle-btn" id="toggleAll">Ver todas</button>
    </div>
    <div id="globalList" style="display:none;"></div>
  </div>
</div>

<script>
const DATA = {
  "Luis": ["Orden y detalle"],
  "Alejandra": [
    "Persona tranquila, clara, no muy seria y que aporte calma",
    "Con sentido de revisión",
    "Con criterio para poder \"bajar\" y proponer ideas"
  ],
  "Blanca": [
    "Organizado",
    "Eficaz / efectivo",
    "Calmado / tranquilo",
    "Motivador, positivo, con ganas de crecer, trabajar e impulsar"
  ],
  "Claudia": [
    "Organizado",
    "Eficaz",
    "Que me impulse a crecer"
  ],
  "Manu": [
    "Organizado, pero que cuide el detalle en su momento para que nada se le escape"
  ],
  "Adrian": [
    "Personas empáticas, colaboradoras, organizadas"
  ],
  "Jesús": [
    "Todos. Me cuesta más el perfil muy organizado pero me viene bien currar con él para aprender"
  ],
  "Alba": [
    "Buena capacidad comunicativa",
    "Específicas en sus necesidades y retos"
  ],
  "Pablo": [
    "Perfil comunicativo que motive",
    "Que ayude a afrontar los nuevos retos"
  ],
  "Alvaro": [
    "Organizada y estructurada"
  ]
};

function renderPerson(person) {
  const content = document.getElementById("content");
  if (!person) { content.innerHTML = '<div class="empty">Elige una persona en el selector.</div>'; return; }
  const items = DATA[person] || [];
  content.innerHTML = `
    <div class="answer-card">
      <h2>${person}</h2>
      <ul>${items.map(i => `<li>${i}</li>`).join("")}</ul>
    </div>
  `;
}

function renderGlobal() {
  const list = document.getElementById("globalList");
  list.innerHTML = Object.entries(DATA).map(([name, items]) => `
    <div class="global-row">
      <div class="name">${name}</div>
      <ul>${items.map(i => `<li>${i}</li>`).join("")}</ul>
    </div>
  `).join("");
}

function init() {
  const select = document.getElementById("person");
  Object.keys(DATA).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
  select.addEventListener("change", e => renderPerson(e.target.value));
  renderPerson("");
  renderGlobal();

  const btn = document.getElementById("toggleAll");
  const list = document.getElementById("globalList");
  btn.addEventListener("click", () => {
    const open = list.style.display === "block";
    list.style.display = open ? "none" : "block";
    btn.textContent = open ? "Ver todas" : "Ocultar";
  });
}
init();
</script>
</body>
</html>
