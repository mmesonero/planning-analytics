<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Canción del Momento · Planning & Analytics</title>
<style>
  :root {
    --bg: #000000;
    --bg-soft: #0a0a0a;
    --card: #141414;
    --card-hover: #1c1c1c;
    --border: #262626;
    --border-strong: #3a3a3a;
    --text: #ffffff;
    --muted: #9a9a9a;
    --accent: #86BC25;
    --accent-hover: #97cf2e;
    --accent-glow: rgba(134, 188, 37, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 24px 60px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    top: -200px;
    right: -200px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  .back-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.95rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }

  h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; line-height: 1.2; }
  .subtitle { color: var(--muted); margin-bottom: 32px; }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .column {
    background: linear-gradient(135deg, var(--card) 0%, var(--bg-soft) 100%);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
  }
  .column::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    height: 3px;
    width: 100%;
    background: var(--accent);
  }
  .column h2 {
    font-size: 0.85rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .column .when-label {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  .row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }
  .row:last-child { border-bottom: none; }
  .row .name {
    font-weight: 600;
    color: var(--text);
    font-size: 0.95rem;
  }
  .row .song {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.45;
  }
  .row .song.empty { font-style: italic; color: #555; font-size: 0.85rem; }

  @media (max-width: 700px) {
    .columns { grid-template-columns: 1fr; }
    .row { grid-template-columns: 90px 1fr; gap: 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <a href="index.html" class="back-link">← Volver al panel</a>
  </div>

  <h1>Canción del Momento</h1>
  <p class="subtitle">Una canción que defina al equipo hoy y en 6 meses.</p>

  <div class="columns">
    <div class="column">
      <h2>Hoy</h2>
      <div class="when-label">Cómo está el equipo ahora</div>
      <div id="listHoy"></div>
    </div>
    <div class="column">
      <h2>En 6 meses</h2>
      <div class="when-label">Hacia dónde vamos</div>
      <div id="listFuturo"></div>
    </div>
  </div>
</div>

<script>
const DATA = {
  "Luis": {
    hoy: "Es algo generacional / La tortuga",
    futuro: "Estamos bien / Cantemos las canciones"
  },
  "Alejandra": {
    hoy: "Mamma Mia (ABBA)",
    futuro: ""
  },
  "Blanca": {
    hoy: "We Are All In This Together (HSM)",
    futuro: "We Are The Champions (Queen)"
  },
  "Claudia": {
    hoy: "Ojos de Tigre",
    futuro: "Superestrella"
  },
  "Manu": {
    hoy: "Sesión DJ Pastis",
    futuro: "Atlantis"
  },
  "Adrian": {
    hoy: "Play Hard (David Guetta)",
    futuro: "Billionaire (Bruno Mars)"
  },
  "Jesús": {
    hoy: "Sad Flow Vibes",
    futuro: "Dancing for Summer"
  },
  "Alba": {
    hoy: "I Will Survive (Gloria Gaynor)",
    futuro: "We Are The Champions (Queen)"
  },
  "Pablo": {
    hoy: "Don't Stop The Music (Rihanna)",
    futuro: "Power (Neo Johnson)"
  },
  "Alvaro": {
    hoy: "Adventure of a Lifetime",
    futuro: "Valhalla"
  }
};

function renderList(elId, key) {
  const el = document.getElementById(elId);
  el.innerHTML = Object.entries(DATA).map(([name, p]) => {
    const v = p[key];
    return `<div class="row">
      <div class="name">${name}</div>
      <div class="song ${v ? '' : 'empty'}">${v || '— sin respuesta —'}</div>
    </div>`;
  }).join("");
}

renderList("listHoy", "hoy");
renderList("listFuturo", "futuro");
</script>
</body>
</html>
